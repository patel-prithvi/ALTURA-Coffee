<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join ALTURA | Premium Coffee</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>
<body style="background: var(--cream);">

    <header class="header">
        <nav class="navbar container">
            <a href="index.html" class="logo">
                <svg viewBox="0 0 26 26" fill="none"><path d="M13 2 L22 9 L19 18 L7 18 L4 9 Z" stroke="currentColor" stroke-width="1.4"></path></svg>
                <span>ALTURA</span>
            </a>
        </nav>
    </header>

    <main class="container">
        <div class="auth-container">
            <div class="text-center mb-4">
                <h2>Join the Club</h2>
                <p style="color: var(--text-light);">Create an account for faster checkout and rewards.</p>
            </div>

            <div id="auth-error" style="color: var(--danger); text-align: center; margin-bottom: 15px; font-weight: 600;"></div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" required placeholder="Minimum 6 characters">
                </div>
                
                <button type="submit" class="primary-btn mt-2" style="width:100%; border-radius: 12px;">
                    Create Account
                </button>
            </form>

            <div class="text-center mt-4">
                <p>Already have an account? <a href="login.html" style="color: var(--secondary); font-weight: 700;">Log in here</a></p>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (password.length < 6) {
                document.getElementById('auth-error').textContent = "Password must be at least 6 characters.";
                return;
            }

            const response = AuthEngine.signup(name, email, password);

            if (response.success) {
                alert('Welcome to the club, ' + name + '!');
                window.location.href = 'index.html';
            } else {
                document.getElementById('auth-error').textContent = response.message;
            }
        });
    </script>
</body>
</html>
