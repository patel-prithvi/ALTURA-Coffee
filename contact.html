<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | ALTURA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container" style="max-width: 900px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px;">
        <div class="contact-info">
            <h2>Get in Touch</h2>
            <p class="mb-4">Have questions? We'd love to hear from you.</p>
            <p><strong>Location:</strong> Ahmedabad, Gujarat, India</p>
            <p><strong>Email:</strong> hello@altura.coffee</p>
            <p><strong>Phone:</strong> +91 99000 12345</p>
        </div>
        <form>
            <div class="form-group"><label>Name</label><input type="text" required></div>
            <div class="form-group"><label>Email</label><input type="email" required></div>
            <div class="form-group"><label>Message</label><textarea rows="5" required></textarea></div>
            <button type="submit" class="primary-btn">Send Message</button>
        </form>
    </div>
</body>
</html>
