<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ALTURA Coffee</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>
<body style="background: var(--cream);">

    <!-- Simple Header -->
    <header class="header">
        <nav class="navbar container">
            <a href="index.html" class="logo">
                <svg viewBox="0 0 26 26" fill="none"><path d="M13 2 L22 9 L19 18 L7 18 L4 9 Z" stroke="currentColor" stroke-width="1.4"></path></svg>
                <span>ALTURA</span>
            </a>
        </nav>
    </header>

    <main class="container">
        <div class="auth-container">
            <div class="text-center mb-4">
                <h2>Welcome Back</h2>
                <p style="color: var(--text-light);">Enter your details to access your account.</p>
            </div>

            <div id="auth-error" style="color: var(--danger); text-align: center; margin-bottom: 15px; font-weight: 600;"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="primary-btn mt-2" style="width:100%; border-radius: 12px;">
                    Sign In
                </button>
            </form>

            <div class="text-center mt-4">
                <p>New to ALTURA? <a href="signup.html" style="color: var(--secondary); font-weight: 700;">Create an account</a></p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = AuthEngine.login(email, password);

            if (response.success) {
                // If the user was redirected here from the cart, send them back to checkout
                const redirectTo = localStorage.getItem('redirect_after_login') || 'index.html';
                localStorage.removeItem('redirect_after_login');
                window.location.href = redirectTo;
            } else {
                document.getElementById('auth-error').textContent = response.message;
            }
        });
    </script>
</body>
</html>
